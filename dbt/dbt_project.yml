name: "dwh_ecopay_transaction_detail"
version: "1.0.0"
config-version: 2

profile: "dwh_ecopay_transaction_detail"

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# Layer -> schema mapping mirrors fv_dwh: staging/core/mart each land in their own schema.
# Materialization is declared per-model (staging: incremental append; core: materialized_deduplicate;
# mart: incremental), matching the fv_dwh convention, so it is NOT set here.
models:
  dwh_ecopay_transaction_detail:
    staging:
      +schema: staging
    core:
      +schema: core
    mart:
      +schema: mart

vars:
  # Default retention window (days) — mirrors fv_dwh; consumed by the materialized_deduplicate
  # macro via a model-level `data_retention_days` config when a model opts in.
  default_retention_day: 90
